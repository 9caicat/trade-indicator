# 数据文件路径
PROJECT_ROOT = Path(__file__).parent.parent
DATA_DIR = PROJECT_ROOT / "data"
HISTORY_FILE = DATA_DIR / "indicators.json"
LATEST_FILE = DATA_DIR / "latest.json"
MARKETS_FILE = DATA_DIR / "markets.json"
HISTORY_META_FILE = DATA_DIR / "diamond_index_history.json"

# 状态阈值（百分位）
THRESHOLD_PERCENTILES = {
    "diamond_bottom": 5,   # 钻石底: 5%分位数
    "dca_line": 25,        # 定投线: 25%分位数
    "equilibrium": 50,     # 均衡: 50%分位数
    "warm": 75,            # 偏热: 75%分位数
    "hot": 90,             # 过热: 90%分位数
    "extreme_hot": 95,     # 极热: 95%分位数
}

# 状态名称映射
STATUS_MAP = {
    "diamond_bottom": ("钻石底", "#00c853"),      # 深绿
    "dca": ("定投区", "#64dd17"),                 # 浅绿
    "equilibrium": ("合理", "#2979ff"),            # 蓝
    "warm": ("偏热", "#ff9100"),                   # 橙
    "hot": ("过热", "#ff1744"),                    # 红
    "extreme_hot": ("极热", "#b71c1c"),            # 深红
}


def ensure_dirs():
    """确保数据目录存在"""
    DATA_DIR.mkdir(parents=True, exist_ok=True)


def load_json(filepath):
    """加载JSON文件，不存在返回空"""
    if filepath.exists():
        with open(filepath, "r", encoding="utf-8") as f:
            return json.load(f)
    return {}


def save_json(filepath, data):
    """保存JSON文件"""
    with open(filepath, "w", encoding="utf-8") as f:
        json.dump(data, f, ensure_ascii=False, indent=2)
    print(f"  已保存: {filepath}")


def fetch_index_data(ak_code, start_date, end_date):
    """
    从akshare获取指数历史数据
    
    参数:
        ak_code: akshare代码，如 'sh000001'
        start_date: 开始日期 'YYYYMMDD'
        end_date: 结束日期 'YYYYMMDD'
    
    返回:
        DataFrame: 包含 date, close 列
    """
    try:
        # 使用 akshare 的 index_zh_a_hist 接口
        symbol = ak_code[2:]  # 去掉 sh/sz 前缀
        market = ak_code[:2]  # sh 或 sz
        
        df = ak.index_zh_a_hist(
            symbol=symbol,
            period="daily",
            start_date=start_date,
            end_date=end_date,
        )
        
        if df is None or df.empty:
            print(f"  警告: {ak_code} 无数据")
            return None
        
        # 标准化列名
        df = df[["日期", "收盘"]].copy()
        df.columns = ["date", "close"]
        df["date"] = pd.to_datetime(df["date"])
        df["close"] = pd.to_numeric(df["close"], errors="coerce")
        df = df.dropna()
        df = df.sort_values("date").reset_index(drop=True)
        
        return df
    except Exception as e:
        print(f"  错误: 获取 {ak_code} 数据失败: {e}")
        return None


def calculate_diamond_index(df):
    """
    计算钻石底指数
    
    公式: 钻石底指数 = (现价 / MA200) * sqrt(现价 / MA850)
    
    参数:
        df: DataFrame，包含 close 列
    
    返回:
        DataFrame: 新增 ma200, ma850, diamond_index 列
    """
    # 计算移动平均线
    df["ma200"] = df["close"].rolling(window=200, min_periods=1).mean()
    df["ma850"] = df["close"].rolling(window=850, min_periods=1).mean()
    
    # 计算钻石底指数
    df["diamond_index"] = (df["close"] / df["ma200"]) * np.sqrt(df["close"] / df["ma850"])
    
    return df


def get_status(diamond_index, thresholds):
    """
    根据钻石底指数值和阈值判断状态
    
    参数:
        diamond_index: 当前钻石底指数值
        thresholds: 阈值字典
    
    返回:
        (状态名, 颜色)
    """
    if diamond_index <= thresholds["diamond_bottom"]:
        return STATUS_MAP["diamond_bottom"]
    elif diamond_index <= thresholds["dca_line"]:
        return STATUS_MAP["dca"]
    elif diamond_index <= thresholds["equilibrium"]:
        return STATUS_MAP["equilibrium"]
    elif diamond_index <= thresholds["warm"]:
        return STATUS_MAP["warm"]
    elif diamond_index <= thresholds["hot"]:
        return STATUS_MAP["hot"]
    else:
        return STATUS_MAP["extreme_hot"]


def calculate_thresholds(df):
    """
    计算各状态的阈值（基于历史分位数）
    
    参数:
        df: DataFrame，包含 diamond_index 列
    
    返回:
        dict: 各状态的阈值
    """
    di = df["diamond_index"].dropna()
    
    return {
        "diamond_bottom": round(float(di.quantile(0.05)), 4),
        "dca_line": round(float(di.quantile(0.25)), 4),
        "equilibrium": round(float(di.quantile(0.50)), 4),
        "warm": round(float(di.quantile(0.75)), 4),
        "hot": round(float(di.quantile(0.90)), 4),
        "extreme_hot": round(float(di.quantile(0.95)), 4),
    }


def calculate_percentile(df, current_di):
    """计算当前钻石底指数在历史中的百分位"""
    di = df["diamond_index"].dropna()
    return int((di <= current_di).mean() * 100)


def calculate_momentum(df, window=20):
    """
    计算近期动量（钻石底指数的变化率）
    
    参数:
        df: DataFrame
        window: 计算窗口（交易日）
    
    返回:
        (动量值, 动量标签)
    """
    if len(df) < window + 1:
        return 0, "→ 平稳"
    
    recent = df["diamond_index"].iloc[-window:]
    prev = df["diamond_index"].iloc[-window-1:-1]
    
    momentum = ((recent.iloc[-1] - prev.iloc[0]) / prev.iloc[0] * 100)
    momentum = round(momentum, 1)
    
    if momentum > 5:
        label = "↑↑ 加速"
    elif momentum > 2:
        label = "↑ 上升"
    elif momentum > -2:
        label = "→ 平稳"
    elif momentum > -5:
        label = "↓ 下降"
    else:
        label = "↓↓ 加速下降"
    
    return momentum, label


def calculate_expected_return(df, current_di):
    """
    估算未来180日预期收益率（基于历史同类位置统计）
    
    参数:
        df: DataFrame，包含 close 和 diamond_index
        current_di: 当前钻石底指数
    
    返回:
        预期收益率(%)
    """
    # 找到历史中与当前钻石底指数最接近的记录
    di = df["diamond_index"].dropna()
    
    # 计算与当前值的距离
    distances = (di - current_di).abs()
    
    # 找到最近的历史时刻（排除最近30天）
    valid_idx = distances.iloc[:-30].nsmallest(50).index
    
    if len(valid_idx) == 0:
        return 0
    
    returns = []
    for idx in valid_idx:
        if idx + 180 < len(df):
            future_return = (df.iloc[idx + 180]["close"] / df.iloc[idx]["close"] - 1) * 100
            returns.append(future_return)
    
    if not returns:
        return 0
    
    return round(np.median(returns), 1)


def calculate_max_drawdown(df, current_di):
    """
    估算未来最大回撤（基于历史同类位置统计）
    
    参数:
        df: DataFrame
        current_di: 当前钻石底指数
    
    返回:
        最大回撤(%)
    """
    di = df["diamond_index"].dropna()
    distances = (di - current_di).abs()
    valid_idx = distances.iloc[:-30].nsmallest(50).index
    
    if len(valid_idx) == 0:
        return 0
    
    drawdowns = []
    for idx in valid_idx:
        if idx + 180 < len(df):
            start_price = df.iloc[idx]["close"]
            future_prices = df.iloc[idx:idx + 180]["close"]
            peak = future_prices.cummax()
            dd = ((future_prices / peak - 1) * 100).min()
            drawdowns.append(dd)
    
    if not drawdowns:
        return 0
    
    return round(np.median(drawdowns), 1)


def calculate_duration(df, thresholds):
    """
    计算当前状态已持续天数和历史平均持续天数
    
    参数:
        df: DataFrame
        thresholds: 阈值字典
    
    返回:
        (当前持续天数, 历史平均持续天数)
    """
    di = df["diamond_index"].dropna()
    
    # 当前状态
    current_di = di.iloc[-1]
    current_status = get_status(current_di, thresholds)[0]
    
    # 计算历史持续天数
    durations = []
    current_duration = 0
    
    for i in range(len(di)):
        status = get_status(di.iloc[i], thresholds)[0]
        if status == current_status:
            current_duration += 1
        else:
            if current_duration > 0:
                durations.append(current_duration)
                current_duration = 0
    
    if current_duration > 0:
        durations.append(current_duration)
    
    # 当前持续天数（从最近一个状态变化点开始）
    if durations:
        current_dur = durations[-1]
    else:
        current_dur = 0
    
    # 历史平均持续天数
    avg_dur = int(np.mean(durations)) if durations else 0
    
    return current_dur, avg_dur


def update_index_data(name, config, existing_data):
    """
    更新单个指数的数据
    
    参数:
        name: 指数名称
        config: 指数配置
        existing_data: 已有历史数据
    
    返回:
        (历史数据列表, 最新数据字典)
    """
    print(f"\n  正在更新: {name} ({config['code']})")
    
    # 确定数据获取范围
    end_date = datetime.now()
    
    if name in existing_data and existing_data[name]:
        # 有历史数据，从最后一条的日期开始
        last_date = datetime.strptime(existing_data[name][-1]["date"], "%Y-%m-%d")
        start_date = last_date - timedelta(days=1000)  # 多取一些用于计算均线
    else:
        # 无历史数据，从2018年开始
        start_date = datetime(2018, 1, 1)
    
    # 获取数据
    df = fetch_index_data(
        config["ak_code"],
        start_date.strftime("%Y%m%d"),
        end_date.strftime("%Y%m%d")
    )
    
    if df is None or df.empty:
        print(f"  跳过: {name} 无数据")
        return existing_data.get(name, []), None
    
    # 计算指标
    df = calculate_diamond_index(df)
    
    # 合并历史数据
    if name in existing_data and existing_data[name]:
        old_df = pd.DataFrame(existing_data[name])
        old_df["date"] = pd.to_datetime(old_df["date"])
        
        # 合并新旧数据，去重
        combined = pd.concat([old_df, df], ignore_index=True)
        combined = combined.drop_duplicates(subset=["date"], keep="last")
        combined = combined.sort_values("date").reset_index(drop=True)
        
        # 重新计算（因为合并后均线可能需要更新）
        combined = calculate_diamond_index(combined)
        df = combined
    
    # 计算阈值（基于完整历史数据）
    thresholds = calculate_thresholds(df)
    
    # 最新数据
    latest_row = df.iloc[-1]
    current_di = latest_row["diamond_index"]
    
    status, status_color = get_status(current_di, thresholds)
    percentile = calculate_percentile(df, current_di)
    momentum, momentum_label = calculate_momentum(df)
    expected_return = calculate_expected_return(df, current_di)
    max_drawdown = calculate_max_drawdown(df, current_di)
    current_duration, avg_duration = calculate_duration(df, thresholds)
    
    # 构建历史数据列表（每周取一个点以减少体积，但保留最近30天的每日数据）
    df_sorted = df.sort_values("date").reset_index(drop=True)
    
    # 最近30天每日保留
    recent_30 = df_sorted.tail(30)
    # 30天之前每周取一个点
    older = df_sorted.iloc[:-30]
    if len(older) > 0:
        older["week"] = older["date"].dt.isocalendar().week
        older["year"] = older["date"].dt.isocalendar().year
        older_weekly = older.groupby(["year", "week"]).tail(1)
        history_df = pd.concat([older_weekly, recent_30]).drop_duplicates(subset=["date"]).sort_values("date")
    else:
        history_df = df_sorted
    
    history_list = []
    for _, row in history_df.iterrows():
        history_list.append({
            "date": row["date"].strftime("%Y-%m-%d"),
            "close": round(float(row["close"]), 2),
            "diamond_index": round(float(row["diamond_index"]), 4),
            "ma200": round(float(row["ma200"]), 2) if not pd.isna(row["ma200"]) else None,
            "ma850": round(float(row["ma850"]), 2) if not pd.isna(row["ma850"]) else None,
        })
    
    # 最新数据字典
    latest_data = {
        "date": latest_row["date"].strftime("%Y-%m-%d"),
        "close": round(float(latest_row["close"]), 2),
        "diamond_index": round(float(current_di), 4),
        "status": status,
        "status_color": status_color,
        "thresholds": thresholds,
        "percentile": percentile,
        "current_duration": current_duration,
        "avg_duration": avg_duration,
        "momentum": momentum,
        "momentum_label": momentum_label,
        "expected_return": expected_return,
        "max_drawdown": max_drawdown,
    }
    
    print(f"    最新日期: {latest_data['date']}, 收盘价: {latest_data['close']}")
    print(f"    钻石底指数: {latest_data['diamond_index']}, 状态: {status}")
    
    return history_list, latest_data


def update_all_data():
    """更新所有指数数据"""
    print("=" * 60)
    print("韭菜老猫钻石底指数 - 数据更新")
    print(f"开始时间: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}")
    print("=" * 60)
    
    ensure_dirs()
    
    # 加载已有数据
    existing_history = load_json(HISTORY_FILE)
    
    # 更新每个指数
    all_history = {}
    all_latest = {}
    
    for name, config in INDEX_CONFIG.items():
        try:
            history, latest = update_index_data(name, config, existing_history)
            all_history[name] = history
            if latest:
                all_latest[name] = {**latest, **{k: v for k, v in config.items() if k != "ak_code"}}
        except Exception as e:
            print(f"  错误: 更新 {name} 失败: {e}")
            # 使用已有数据
            if name in existing_history:
                all_history[name] = existing_history[name]
    
    # 保存数据
    update_time = datetime.now().strftime("%Y-%m-%d %H:%M:%S")
    
    # 1. 保存历史数据（完整时间序列）
    save_json(HISTORY_FILE, all_history)
    
    # 2. 保存最新快照
    latest_snapshot = {
        "update_time": update_time,
        "data": all_latest,
    }
    save_json(LATEST_FILE, latest_snapshot)
    
    # 3. 保存市场元数据
    markets_data = {
        "diamond_index": {
            "name": "钻石底指数",
            "name_en": "Diamond Bottom Index",
            "description": "基于200日和850日双均线偏离度的底部识别指标。新增定投线用于在钻石底之前开始分批布局，源自韭菜老猫指标的A股适配版本。",
            "formula": "(现价 / MA200) * sqrt(现价 / MA850)",
            "threshold_desc": "钻石底 < 5%分位数 | 定投区 5%~25% | 合理 25%~75% | 偏热 75%~90% | 过热 > 90%",
            "version": "2.1",
            "data_source": "akshare",
            "last_update": update_time,
        }
    }
    save_json(MARKETS_FILE, markets_data)
    
    # 4. 保存指标描述
    history_meta = {
        "diamond_index": markets_data["diamond_index"]
    }
    save_json(HISTORY_META_FILE, history_meta)
    
    print("\n" + "=" * 60)
    print(f"数据更新完成: {update_time}")
    print("=" * 60)
    
    return True


def main():
    """主函数"""
    try:
        success = update_all_data()
        sys.exit(0 if success else 1)
    except Exception as e:
        print(f"\n严重错误: {e}")
        import traceback
        traceback.print_exc()
        sys.exit(1)


if __name__ == "__main__":
    main()
